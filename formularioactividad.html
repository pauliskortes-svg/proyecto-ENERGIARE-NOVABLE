<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio formulario</title>
    <link rel="stylesheet" href="formulario.css">
</head>
<body>
    <h1>Ejercicio formulario</h1>
    
    <!-- Formulario -->
    <form id="formulario">
     <fieldset>
      <legend>Fomulario Numero</legend>
        <label for="ed">Numero 1:</label>
        <input type="number" id="fNumero1" required><br><br>
        
        <label for="ed">Numero 2:</label>
        <input type="number" id="fNumero2" required><br><br>

        <label for="ed">Numero 3:</label>
        <input type="number" id="fNumero3" required><br><br>
        
        <!-- Botón sin la llamada a función en el evento onclick -->
        <button type="button" id="verificarBtn">Verificar</button>
      </fieldset>  
    </form>

    <!-- Contenedor para mostrar el resultado -->
    <p id="resultado"></p>
 
    <script src="formularioactividad.js" defer></script>
</body>
</html>

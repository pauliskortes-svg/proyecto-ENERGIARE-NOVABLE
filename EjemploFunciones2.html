<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ejercicios con Funciones</title>
    <link rel="stylesheet" href="funciones.css">
</head>
<body>

    <h2>Promedio del Alumno</h2>
    <input type="number" id="nota1" placeholder="Nota 1">
    <input type="number" id="nota2" placeholder="Nota 2">
    <input type="number" id="nota3" placeholder="Nota 3">
    <button onclick="calcularPromedio()">Calcular</button>
    <p id="resultadoPromedio"></p>
     
    <h2>Contar Notas</h2>
    <input type="number" id="n1">
    <input type="number" id="n2">
    <input type="number" id="n3">
    <button onclick="contarNotas()">Contar</button>
    <p id="resultadoNotas"></p>

    <h2>Ingresar Palabras</h2>
    <input type="text" id="palabra" placeholder="Escribe una palabra">
    <button onclick="verificarPalabra()">Enviar</button>
    <p id="resultadoPalabras"></p>

    <h2>Descuento</h2>
    <input type="number" id="precio" placeholder="Ingrese precio">
    <button onclick="calcularDescuento()">Calcular</button>
    <p id="resultadoDescuento"></p>

    <h2>Número Mayor</h2>
    <input type="number" id="num1">
    <input type="number" id="num2">
    <input type="number" id="num3">
    <button onclick="mostrarMayor()">Mostrar Mayor</button>
    <p id="resultadoMayor"></p>

    <script src="ejemploFunciones2.js"></script>
</body>
</html>
